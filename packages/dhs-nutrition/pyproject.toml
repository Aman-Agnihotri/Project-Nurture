[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dhs-nutrition"
version = "0.1.0"
description = "Survey-weighted child nutrition indicators from DHS PR (household member) recodes"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Aman Agnihotri" }]
keywords = ["dhs", "nutrition", "survey-weighted", "public-health", "child-health"]
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Intended Audience :: Science/Research",
]
dependencies = [
    "pandas>=2.0",
    "numpy>=1.24",
    "pyshp>=2.3",
    "pandera>=0.19",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.4", "build"]

[project.scripts]
dhs-nutrition = "dhs_nutrition.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/dhs_nutrition"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
